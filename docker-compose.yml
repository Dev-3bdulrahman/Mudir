version: '3.8'

services:
  child-project:
    build:
      context: .
      dockerfile: Dockerfile
    image: child-project:latest
    container_name: child-project
    restart: always
    networks:
      - coolify
    expose:
      - "80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8001
      - PARENT_URL=http://parent-project:8000

networks:
  coolify:
    external: true
